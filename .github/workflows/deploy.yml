name: 部署 Workers

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '选择部署目标'
        required: true
        default: '全部'
        type: choice
        options:
          - '全部'
          - '仅后端'
          - '仅前端'
          - '仅 Bot'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Wrangler
        run: npm install -g wrangler

      - name: 校验文件结构
        run: |
          echo "=== 仓库根目录内容 ==="
          ls -la
          echo ""
          echo "=== backend 目录 ==="
          ls -la backend/ || echo "backend 不存在"
          echo ""
          echo "=== frontend 目录 ==="
          ls -la frontend/ || echo "frontend 不存在"
          echo ""
          echo "=== bots 目录 ==="
          ls -la bots/ || echo "bots 不存在"
          echo ""
          echo "=== 检查 backend/_worker.js ==="
          if [ -f backend/_worker.js ]; then
            echo "[OK] backend/_worker.js 存在"
          else
            echo "[FAIL] backend/_worker.js 不存在"
            exit 1
          fi
          echo ""
          echo "=== 检查 frontend/_worker.js ==="
          if [ -f frontend/_worker.js ]; then
            echo "[OK] frontend/_worker.js 存在"
          else
            echo "[FAIL] frontend/_worker.js 不存在"
            exit 1
          fi
          echo ""
          echo "=== 检查 bots/wrangler.toml ==="
          if [ -f bots/wrangler.toml ]; then
            echo "[OK] bots/wrangler.toml 存在"
          else
            echo "[FAIL] bots/wrangler.toml 不存在"
            exit 1
          fi

      - name: 部署后端 Worker
        if: github.event.inputs.deploy_target == '全部' || github.event.inputs.deploy_target == '仅后端'
        run: wrangler deploy --config backend/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: 部署前端 Worker
        if: github.event.inputs.deploy_target == '全部' || github.event.inputs.deploy_target == '仅前端'
        run: wrangler deploy --config frontend/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: 部署 Bot Worker
        if: github.event.inputs.deploy_target == '全部' || github.event.inputs.deploy_target == '仅 Bot'
        run: wrangler deploy --config bots/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: 部署完成
        run: |
          echo "部署目标: ${{ github.event.inputs.deploy_target }}"
          echo "访问地址:"
          echo "  前端: https://live.262832.xyz"
          echo "  Bot: 请自行配置 Webhook"
