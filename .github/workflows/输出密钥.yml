name: 输出密钥

on:
  workflow_dispatch:

jobs:
  output:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - name: 输出两个密钥
        run: |
          {
            echo "# 密钥信息"
            echo ""
            echo "- CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-未设置}"
            echo "- CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-未设置}"
          } >> "$GITHUB_STEP_SUMMARY"
