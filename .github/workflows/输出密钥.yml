name: 导出密钥

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - name: 写入密钥到文件
        run: |
          echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" > secrets.txt
          echo "CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID" >> secrets.txt

      - name: 上传密钥文件
        uses: actions/upload-artifact@v4
        with:
          name: secrets-export
          path: secrets.txt

      - name: 提示
        run: |
          echo "# 密钥导出完成" >> $GITHUB_STEP_SUMMARY
          echo "请下载 Artifact `secrets-export` 中的 `secrets.txt` 查看明文密钥。" >> $GITHUB_STEP_SUMMARY
